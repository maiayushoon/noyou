# Brings up the NoYou API + Postgres. The app also runs fine without this
# (SQLite default), so compose is for a more production-like local stack.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noyou
      POSTGRES_PASSWORD: noyou
      POSTGRES_DB: noyou
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noyou"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://noyou:noyou@db:5432/noyou
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANALYZER: ${ANALYZER:-rule_based}
      CONNECTORS: ${CONNECTORS:-demo}
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-360}
      SEED_DEMO: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/frontend:ro

volumes:
  pgdata:
