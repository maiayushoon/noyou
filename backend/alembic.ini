# Alembic configuration for NoYou.
#
# The database URL is intentionally left blank here: alembic/env.py reads it from
# the application settings at runtime (app.core.config.settings.database_url), so
# there is exactly one source of truth and no credentials live in this file.

[alembic]
# Path to migration scripts, relative to this file's directory (backend/).
script_location = alembic

# Template used to generate migration file names. Prefixing with a date keeps the
# versions/ directory sorted chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Use the OS path separator for version_locations / script_location.
prepend_sys_path = .

# Timezone for file_template timestamps (blank = local time).
# timezone =

# Max length of the "slug" portion of a generated filename.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command, regardless
# of autogenerate.
# revision_environment = false

# Leave blank — env.py injects settings.database_url at runtime.
sqlalchemy.url =


[post_write_hooks]
# Optional formatters to run on newly generated migrations (disabled by default).
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
